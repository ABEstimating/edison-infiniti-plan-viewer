<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0b1220">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>AB Plan Viewer</title>
<style>
:root{--nav:#0b1220;--nav2:#172033;--panel:#fff;--bg:#eef2f6;--line:#d8dee8;--ink:#172033;--muted:#667085;--accent:#2563eb;--accentSoft:#eaf1ff;--shadow:0 18px 50px rgba(15,23,42,.12)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:var(--ink);background:var(--bg)}button,input{font:inherit}.top{background:linear-gradient(145deg,var(--nav),var(--nav2));color:#fff;padding:18px max(20px,calc((100vw - 1180px)/2));box-shadow:0 2px 12px rgba(15,23,42,.2)}.brand{display:flex;align-items:center;gap:12px}.mark{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.2)}.mark img{display:block;width:36px;height:auto}.brand h1{margin:0;font-size:19px}.brand p{margin:3px 0 0;color:#c3cce0;font-size:12px}.wrap{max-width:1180px;margin:0 auto;padding:28px 20px 50px}.hero{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:20px}.hero h2{margin:0 0 5px;font-size:24px}.hero p{margin:0;color:var(--muted);font-size:13px;line-height:1.5}.search{position:relative;width:min(380px,100%)}.search input{width:100%;height:42px;padding:0 38px 0 40px;border:1px solid var(--line);border-radius:10px;background:#fff;outline:0}.search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12)}.search svg{position:absolute;left:13px;top:12px;width:18px;height:18px;color:#8791a5}.clear{position:absolute;right:7px;top:6px;width:30px;height:30px;border:0;border-radius:8px;background:transparent;color:#667085;display:none}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px}.card{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}.cardHead{padding:18px 18px 14px;background:linear-gradient(135deg,#f8fafc,#eef3fa);border-bottom:1px solid var(--line)}.cardTitle{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.card h3{margin:0;font-size:17px}.badge{flex:0 0 auto;padding:4px 8px;border-radius:999px;background:#e8f7ef;color:#087443;font-size:10px;font-weight:850;text-transform:uppercase;letter-spacing:.06em}.address{margin-top:5px;color:var(--muted);font-size:12px}.meta{padding:14px 18px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.stat{min-width:0}.stat label{display:block;color:#8993a5;font-size:9px;font-weight:850;text-transform:uppercase;letter-spacing:.08em}.stat strong{display:block;margin-top:3px;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.actions{display:flex;gap:8px;padding:0 18px 18px}.btn{height:38px;padding:0 13px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);font-weight:750;font-size:12px;display:inline-flex;align-items:center;justify-content:center;text-decoration:none}.btn.primary{flex:1;background:var(--accent);border-color:var(--accent);color:#fff}.btn:hover{filter:brightness(.98)}.empty{padding:32px;border:1px dashed #bdc6d4;border-radius:14px;background:rgba(255,255,255,.55);color:var(--muted);text-align:center;font-size:13px}.foot{margin-top:18px;color:#8993a5;font-size:11px}.loading{padding:30px;text-align:center;color:var(--muted)}
@media(max-width:720px){.top{padding:14px 16px}.wrap{padding:20px 14px 40px}.hero{align-items:stretch;flex-direction:column}.hero h2{font-size:21px}.search{width:100%}.grid{grid-template-columns:1fr}.meta{grid-template-columns:1fr 1fr}.stat:last-child{grid-column:1/-1}}
</style>
</head>
<body>
<header class="top"><div class="brand"><div class="mark"><img src="ab-logo-white.svg?v=1" alt="AutoBuilders"></div><div><h1>AB Plan Viewer</h1><p>Prepared, indexed construction plan sets</p></div></div></header>
<main class="wrap">
  <section class="hero"><div><h2>Projects</h2><p>Select a project to open its desktop or mobile plan viewer.</p></div><div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.4-3.4"/></svg><input id="search" placeholder="Search projects or addresses"><button id="clear" class="clear" aria-label="Clear">×</button></div></section>
  <div id="projects" class="grid"><div class="loading">Loading projects…</div></div>
  <div class="foot">Plan sets are prepared and indexed before they are added to this viewer.</div>
</main>
<script>
'use strict';
const $=id=>document.getElementById(id);let projects=[];
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmtDate(s){if(!s)return '—';const d=new Date(`${s}T00:00:00`);return Number.isNaN(d.getTime())?s:d.toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'});}
function openUrl(p){return `viewer.html?project=${encodeURIComponent(p.id)}`;}
function render(){const q=$('search').value.trim().toLowerCase(),root=$('projects');const shown=projects.filter(p=>!q||`${p.name} ${p.address} ${p.setName}`.toLowerCase().includes(q));if(!shown.length){root.innerHTML='<div class="empty">No projects match that search.</div>';return;}root.innerHTML=shown.map(p=>`<article class="card"><div class="cardHead"><div class="cardTitle"><h3>${esc(p.name)}</h3><span class="badge">Ready</span></div><div class="address">${esc(p.address||'')}</div></div><div class="meta"><div class="stat"><label>Drawing set</label><strong>${esc(p.setName||'Plan Set')}</strong></div><div class="stat"><label>Set date</label><strong>${esc(fmtDate(p.setDate))}</strong></div><div class="stat"><label>Sheets</label><strong>${Number(p.sheetCount)||0}</strong></div></div><div class="actions"><a class="btn primary" href="${openUrl(p)}">Open plans</a></div></article>`).join('');}
$('search').oninput=e=>{$('clear').style.display=e.target.value?'block':'none';render();};$('clear').onclick=()=>{$('search').value='';$('clear').style.display='none';render();$('search').focus();};
fetch('projects.json?v=2',{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error('Project registry unavailable');return r.json();}).then(data=>{projects=Array.isArray(data.projects)?data.projects:[];document.title=data.brand||'AB Plan Viewer';render();}).catch(err=>{$('projects').innerHTML=`<div class="empty">${esc(err.message)}. Refresh and try again.</div>`;});
</script>
</body>
</html>
