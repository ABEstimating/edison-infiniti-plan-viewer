<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Edison Infiniti Plan Viewer</title>
<style>
:root{--bg:#0b1020;--panel:#11182b;--panel2:#182238;--line:#283652;--text:#eef3fb;--muted:#96a4bb;--accent:#5ea7ff;--accent2:#276ec8;--shadow:0 12px 32px rgba(0,0,0,.28)}
*{box-sizing:border-box} html,body{height:100%;margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
button,input,select{font:inherit}.app{height:100%;display:grid;grid-template-rows:58px 1fr}.topbar{display:flex;align-items:center;gap:12px;padding:0 16px;border-bottom:1px solid var(--line);background:rgba(15,22,39,.96);box-shadow:var(--shadow);z-index:3}.brand{font-weight:750;letter-spacing:.2px;white-space:nowrap}.project{font-size:12px;color:var(--muted);white-space:nowrap}.spacer{flex:1}.set-switch{display:flex;background:#0b1221;border:1px solid var(--line);border-radius:10px;padding:3px;gap:3px}.set-btn{border:0;background:transparent;color:var(--muted);padding:7px 12px;border-radius:7px;cursor:pointer}.set-btn.active{background:var(--accent2);color:white}.set-btn:disabled{opacity:.45;cursor:not-allowed}.upload-btn,.icon-btn{border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:9px;padding:8px 11px;cursor:pointer}.upload-btn:hover,.icon-btn:hover{border-color:#46618b}.main{min-height:0;display:grid;grid-template-columns:330px 1fr}.sidebar{min-height:0;background:var(--panel);border-right:1px solid var(--line);display:grid;grid-template-rows:auto auto 1fr auto}.side-head{padding:16px 16px 10px}.side-title{font-size:13px;font-weight:700}.side-sub{font-size:12px;color:var(--muted);margin-top:4px}.search-wrap{padding:0 14px 10px}.search{width:100%;border:1px solid var(--line);background:#0b1221;color:var(--text);padding:10px 11px;border-radius:9px;outline:none}.search:focus{border-color:var(--accent)}.sheet-list{overflow:auto;padding:0 8px 12px}.sheet{width:100%;display:grid;grid-template-columns:38px 1fr;gap:8px;align-items:center;text-align:left;border:0;background:transparent;color:var(--text);padding:9px 10px;border-radius:9px;cursor:pointer;margin:2px 0}.sheet:hover{background:#172238}.sheet.active{background:#203a61;box-shadow:inset 3px 0 0 var(--accent)}.num{font-size:11px;color:#9fb5d4;text-align:center;background:#0d1728;border:1px solid #2a3b58;border-radius:6px;padding:5px 2px}.sheet-name{font-size:13px;line-height:1.25}.side-foot{padding:10px 14px;border-top:1px solid var(--line);font-size:11px;color:var(--muted)}
.viewer{min-width:0;min-height:0;display:grid;grid-template-rows:52px 1fr 30px;background:#202735}.toolbar{display:flex;align-items:center;gap:7px;padding:8px 12px;background:#131c2d;border-bottom:1px solid var(--line);overflow-x:auto}.toolbar .icon-btn{padding:6px 9px;min-width:36px}.page-box{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:12px}.page-input{width:48px;border:1px solid var(--line);border-radius:7px;background:#0b1221;color:white;padding:6px;text-align:center}.zoom-label{min-width:56px;text-align:center;font-size:12px;color:var(--muted)}.divider{width:1px;height:26px;background:var(--line);margin:0 3px}.canvas-wrap{position:relative;overflow:auto;background:radial-gradient(circle at 50% 10%,#344057 0,#252d3c 45%,#1d2431 100%);display:flex;align-items:flex-start;justify-content:center;padding:28px}.canvas-stage{position:relative;background:white;box-shadow:0 18px 48px rgba(0,0,0,.5);line-height:0}.canvas-stage canvas{display:block}.loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#d8e5f8;background:rgba(14,20,32,.72);z-index:2;font-size:14px}.statusbar{display:flex;align-items:center;justify-content:space-between;padding:0 12px;background:#111827;border-top:1px solid var(--line);font-size:11px;color:var(--muted)}.notice{position:fixed;right:18px;top:72px;background:#16243a;border:1px solid #355078;border-radius:10px;padding:12px 14px;box-shadow:var(--shadow);font-size:12px;max-width:330px;display:none;z-index:10}.mobile-toggle{display:none}
@media(max-width:850px){.main{grid-template-columns:1fr}.sidebar{position:fixed;left:0;top:58px;bottom:0;width:min(88vw,340px);z-index:6;transform:translateX(-102%);transition:.2s;box-shadow:var(--shadow)}.sidebar.open{transform:translateX(0)}.mobile-toggle{display:inline-flex}.project{display:none}.topbar{gap:7px}.upload-btn{display:none}}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <button class="icon-btn mobile-toggle" id="menuBtn" title="Sheet list">☰</button>
    <div><div class="brand">Plan Viewer</div><div class="project">Edison Infiniti · 842 U.S. Route 1, Edison, NJ</div></div>
    <div class="spacer"></div>
    <div class="set-switch" aria-label="Drawing set">
      <button class="set-btn" id="set60" disabled title="Upload the 60% PDF to enable">60%</button>
      <button class="set-btn active" id="set100">100%</button>
    </div>
    <label class="upload-btn" title="Load a 60% plan set from this computer">Upload 60% PDF<input id="upload60" type="file" accept="application/pdf" hidden></label>
  </header>
  <main class="main">
    <aside class="sidebar" id="sidebar">
      <div class="side-head"><div class="side-title">Drawing Sheets</div><div class="side-sub" id="setLabel">100% set · 14 sheets</div></div>
      <div class="search-wrap"><input class="search" id="sheetSearch" placeholder="Search sheet number or title…"></div>
      <div class="sheet-list" id="sheetList"></div>
      <div class="side-foot">Click a sheet to jump directly to that plan page.</div>
    </aside>
    <section class="viewer" id="viewer">
      <div class="toolbar">
        <button class="icon-btn" id="prevBtn" title="Previous sheet">←</button>
        <div class="page-box"><input class="page-input" id="pageInput" value="1" inputmode="numeric"><span id="pageCount">/ 14</span></div>
        <button class="icon-btn" id="nextBtn" title="Next sheet">→</button>
        <div class="divider"></div>
        <button class="icon-btn" id="zoomOut" title="Zoom out">−</button><span class="zoom-label" id="zoomLabel">100%</span><button class="icon-btn" id="zoomIn" title="Zoom in">+</button>
        <button class="icon-btn" id="fitWidth" title="Fit width">↔</button>
        <button class="icon-btn" id="fitPage" title="Fit page">▣</button>
        <button class="icon-btn" id="rotate" title="Rotate clockwise">↻</button>
        <div class="divider"></div>
        <button class="icon-btn" id="fullscreen" title="Full screen">⛶</button>
        <button class="icon-btn" id="download" title="Download current PDF">⇩</button>
      </div>
      <div class="canvas-wrap" id="canvasWrap"><div class="canvas-stage" id="canvasStage"><canvas id="pdfCanvas"></canvas><div class="loading" id="loading">Loading plans…</div></div></div>
      <div class="statusbar"><span id="currentTitle">01 - Cover Sheet</span><span>Mouse wheel/trackpad to scroll · Ctrl + wheel to zoom</span></div>
    </section>
  </main>
</div>
<div class="notice" id="notice"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs" type="module"></script>
<script type="module">
import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs';
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';
const sheets100=[
['01','Cover Sheet'],['02','Existing Conditions and Removals Plan'],['03','Site Plan'],['04','Grading & Drainage Plan'],['05','Utility Plan'],['06','Signage & Landscaping Plan'],['07','Lighting Plan'],['08','Soil Erosion & Sediment Control Plan'],['09','Soil Erosion & Sediment Control Notes'],['10','Construction Details-1'],['11','Construction Details-2'],['S-1','Tree Management Plan'],['S-2','Car Carrier Circulation Plan'],['S-3','Fire Truck Circulation Plan']
];
const state={pdf:null,page:1,scale:1,rotation:0,set:'100',url:'edison-infiniti-100-percent.pdf',objectUrl:null,sheets:sheets100};
const $=id=>document.getElementById(id), canvas=$('pdfCanvas'),ctx=canvas.getContext('2d'),wrap=$('canvasWrap'),stage=$('canvasStage');
function notice(msg){const n=$('notice');n.textContent=msg;n.style.display='block';clearTimeout(notice.t);notice.t=setTimeout(()=>n.style.display='none',3600)}
function renderList(filter=''){const q=filter.trim().toLowerCase();$('sheetList').innerHTML='';state.sheets.forEach((s,i)=>{const label=`${s[0]} - ${s[1]}`;if(q&&!label.toLowerCase().includes(q))return;const b=document.createElement('button');b.className='sheet'+(state.page===i+1?' active':'');b.innerHTML=`<span class="num">${s[0]}</span><span class="sheet-name">${s[1]}</span>`;b.onclick=()=>{go(i+1);$('sidebar').classList.remove('open')};$('sheetList').appendChild(b)})}
async function loadPdf(url){$('loading').style.display='flex';try{state.pdf=await pdfjsLib.getDocument(url).promise;state.page=Math.min(state.page,state.pdf.numPages);$('pageCount').textContent=`/ ${state.pdf.numPages}`;$('setLabel').textContent=`${state.set}% set · ${state.pdf.numPages} sheets`;await fit('page')}catch(e){console.error(e);$('loading').textContent='Unable to load PDF. Open this site through the provided link or upload a local set.';notice('The PDF could not be loaded.')}renderList($('sheetSearch').value)}
async function render(){if(!state.pdf)return;$('loading').style.display='flex';const page=await state.pdf.getPage(state.page);const viewport=page.getViewport({scale:state.scale,rotation:state.rotation});const dpr=Math.min(window.devicePixelRatio||1,2);canvas.width=Math.floor(viewport.width*dpr);canvas.height=Math.floor(viewport.height*dpr);canvas.style.width=`${viewport.width}px`;canvas.style.height=`${viewport.height}px`;stage.style.width=`${viewport.width}px`;stage.style.height=`${viewport.height}px`;ctx.setTransform(dpr,0,0,dpr,0,0);await page.render({canvasContext:ctx,viewport}).promise;$('loading').style.display='none';$('pageInput').value=state.page;$('zoomLabel').textContent=`${Math.round(state.scale*100)}%`;const s=state.sheets[state.page-1]||[`Page ${state.page}`,''];$('currentTitle').textContent=`${s[0]} - ${s[1]}`;renderList($('sheetSearch').value);history.replaceState(null,'',`#page=${state.page}`)}
async function fit(mode){if(!state.pdf)return;const page=await state.pdf.getPage(state.page);const base=page.getViewport({scale:1,rotation:state.rotation});const pad=56;const availW=Math.max(200,wrap.clientWidth-pad),availH=Math.max(200,wrap.clientHeight-pad);state.scale=mode==='width'?availW/base.width:Math.min(availW/base.width,availH/base.height);state.scale=Math.max(.15,Math.min(state.scale,4));render()}
function go(p){if(!state.pdf)return;state.page=Math.max(1,Math.min(Number(p)||1,state.pdf.numPages));render()}
$('prevBtn').onclick=()=>go(state.page-1);$('nextBtn').onclick=()=>go(state.page+1);$('pageInput').onchange=e=>go(e.target.value);$('zoomIn').onclick=()=>{state.scale=Math.min(4,state.scale*1.2);render()};$('zoomOut').onclick=()=>{state.scale=Math.max(.15,state.scale/1.2);render()};$('fitWidth').onclick=()=>fit('width');$('fitPage').onclick=()=>fit('page');$('rotate').onclick=()=>{state.rotation=(state.rotation+90)%360;fit('page')};$('sheetSearch').oninput=e=>renderList(e.target.value);$('fullscreen').onclick=()=>document.fullscreenElement?document.exitFullscreen():$('viewer').requestFullscreen();$('menuBtn').onclick=()=>$('sidebar').classList.toggle('open');
$('download').onclick=()=>{const a=document.createElement('a');a.href=state.url;a.download=state.set==='100'?'Edison Infiniti 100 Percent Plans.pdf':'Edison Infiniti 60 Percent Plans.pdf';a.click()};
$('upload60').onchange=e=>{const f=e.target.files[0];if(!f)return;if(state.objectUrl)URL.revokeObjectURL(state.objectUrl);state.objectUrl=URL.createObjectURL(f);state.url=state.objectUrl;state.set='60';state.page=1;state.sheets=sheets100;$('set60').disabled=false;$('set60').classList.add('active');$('set100').classList.remove('active');loadPdf(state.url);notice('60% set loaded for this browser session.')};
$('set100').onclick=()=>{state.set='100';state.url='edison-infiniti-100-percent.pdf';state.page=1;state.sheets=sheets100;$('set100').classList.add('active');$('set60').classList.remove('active');loadPdf(state.url)};
$('set60').onclick=()=>{if(!state.objectUrl)return;state.set='60';state.url=state.objectUrl;state.page=1;$('set60').classList.add('active');$('set100').classList.remove('active');loadPdf(state.url)};
wrap.addEventListener('wheel',e=>{if(e.ctrlKey){e.preventDefault();state.scale=Math.max(.15,Math.min(4,state.scale*(e.deltaY<0?1.1:.9)));render()}},{passive:false});
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='PageUp')go(state.page-1);if(e.key==='ArrowRight'||e.key==='PageDown')go(state.page+1);if(e.key==='Home')go(1);if(e.key==='End'&&state.pdf)go(state.pdf.numPages)});
window.addEventListener('resize',()=>{clearTimeout(window._rz);window._rz=setTimeout(()=>fit('page'),180)});
const hash=Number(location.hash.match(/page=(\d+)/)?.[1]||1);state.page=hash;renderList();loadPdf(state.url);
</script>
</body>
</html>
