<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Edison Infiniti Plan Viewer</title>
<style>
:root{--bg:#0b1020;--panel:#11182b;--panel2:#182238;--line:#283652;--text:#eef3fb;--muted:#96a4bb;--accent:#5ea7ff;--accent2:#276ec8;--shadow:0 12px 32px rgba(0,0,0,.28)}
*{box-sizing:border-box}html,body{height:100%;margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}button,input{font:inherit}.app{height:100%;display:grid;grid-template-rows:58px 1fr}.topbar{display:flex;align-items:center;gap:12px;padding:0 16px;border-bottom:1px solid var(--line);background:rgba(15,22,39,.96);box-shadow:var(--shadow);z-index:3}.brand{font-weight:750}.project{font-size:12px;color:var(--muted)}.spacer{flex:1}.set-switch{display:flex;background:#0b1221;border:1px solid var(--line);border-radius:10px;padding:3px;gap:3px}.set-btn{border:0;background:transparent;color:var(--muted);padding:7px 12px;border-radius:7px;cursor:pointer}.set-btn.active{background:var(--accent2);color:#fff}.set-btn:disabled{opacity:.45;cursor:not-allowed}.icon-btn{border:1px solid var(--line);background:var(--panel2);color:var(--text);border-radius:9px;padding:8px 11px;cursor:pointer}.icon-btn:hover{border-color:#46618b}.main{min-height:0;display:grid;grid-template-columns:330px 1fr}.sidebar{min-height:0;background:var(--panel);border-right:1px solid var(--line);display:grid;grid-template-rows:auto auto 1fr auto}.side-head{padding:16px 16px 10px}.side-title{font-size:13px;font-weight:700}.side-sub{font-size:12px;color:var(--muted);margin-top:4px}.search-wrap{padding:0 14px 10px}.search{width:100%;border:1px solid var(--line);background:#0b1221;color:var(--text);padding:10px 11px;border-radius:9px;outline:none}.search:focus{border-color:var(--accent)}.sheet-list{overflow:auto;padding:0 8px 12px}.sheet{width:100%;display:grid;grid-template-columns:38px 1fr auto;gap:8px;align-items:center;text-align:left;border:0;background:transparent;color:var(--text);padding:9px 10px;border-radius:9px;cursor:pointer;margin:2px 0}.sheet:hover{background:#172238}.sheet.active{background:#203a61;box-shadow:inset 3px 0 0 var(--accent)}.num{font-size:11px;color:#9fb5d4;text-align:center;background:#0d1728;border:1px solid #2a3b58;border-radius:6px;padding:5px 2px}.sheet-name{font-size:13px;line-height:1.25}.ready-dot{width:8px;height:8px;border-radius:50%;background:#667085}.ready-dot.loaded{background:#4ade80}.side-foot{padding:10px 14px;border-top:1px solid var(--line);font-size:11px;color:var(--muted)}
.viewer{min-width:0;min-height:0;display:grid;grid-template-rows:52px 1fr 30px;background:#202735}.toolbar{display:flex;align-items:center;gap:7px;padding:8px 12px;background:#131c2d;border-bottom:1px solid var(--line);overflow-x:auto}.toolbar .icon-btn{padding:6px 9px;min-width:36px}.page-box{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:12px}.page-input{width:48px;border:1px solid var(--line);border-radius:7px;background:#0b1221;color:#fff;padding:6px;text-align:center}.zoom-label{min-width:56px;text-align:center;font-size:12px;color:var(--muted)}.divider{width:1px;height:26px;background:var(--line);margin:0 3px}.canvas-wrap{position:relative;overflow:auto;background:radial-gradient(circle at 50% 10%,#344057 0,#252d3c 45%,#1d2431 100%);cursor:grab;user-select:none;touch-action:none}.canvas-wrap.is-dragging{cursor:grabbing}.canvas-stage{position:relative;background:#fff;box-shadow:0 18px 48px rgba(0,0,0,.5);line-height:0;margin:28px auto}.plan-image{display:block;pointer-events:none;transform-origin:top left}.loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#d8e5f8;background:rgba(14,20,32,.72);z-index:2;font-size:14px}.statusbar{display:flex;align-items:center;justify-content:space-between;padding:0 12px;background:#111827;border-top:1px solid var(--line);font-size:11px;color:var(--muted)}.mobile-toggle{display:none}
@media(max-width:850px){.main{grid-template-columns:1fr}.sidebar{position:fixed;left:0;top:58px;bottom:0;width:min(88vw,340px);z-index:6;transform:translateX(-102%);transition:.2s;box-shadow:var(--shadow)}.sidebar.open{transform:translateX(0)}.mobile-toggle{display:inline-flex}.project{display:none}}
</style>
</head>
<body>
<div class="app">
<header class="topbar"><button class="icon-btn mobile-toggle" id="menuBtn">☰</button><div><div class="brand">Plan Viewer</div><div class="project">Edison Infiniti · 842 U.S. Route 1, Edison, NJ</div></div><div class="spacer"></div><div class="set-switch"><button class="set-btn" disabled>60%</button><button class="set-btn active">100%</button></div></header>
<main class="main">
<aside class="sidebar" id="sidebar"><div class="side-head"><div class="side-title">Drawing Sheets</div><div class="side-sub" id="preloadStatus">100% set · preparing sheets…</div></div><div class="search-wrap"><input class="search" id="sheetSearch" placeholder="Search sheet number or title…"></div><div class="sheet-list" id="sheetList"></div><div class="side-foot">Green dot = preloaded. Click any sheet to open it.</div></aside>
<section class="viewer" id="viewer"><div class="toolbar"><button class="icon-btn" id="prevBtn">←</button><div class="page-box"><input class="page-input" id="pageInput" value="1"><span>/ 14</span></div><button class="icon-btn" id="nextBtn">→</button><div class="divider"></div><button class="icon-btn" id="zoomOut">−</button><span class="zoom-label" id="zoomLabel">100%</span><button class="icon-btn" id="zoomIn">+</button><button class="icon-btn" id="fitWidth" title="Fit width">↔</button><button class="icon-btn" id="fitPage" title="Fit page">▣</button><button class="icon-btn" id="rotate" title="Rotate">↻</button><div class="divider"></div><button class="icon-btn" id="fullscreen">⛶</button><button class="icon-btn" id="download">⇩</button></div><div class="canvas-wrap" id="canvasWrap"><div class="canvas-stage" id="canvasStage"><img class="plan-image" id="planImage" alt="Plan sheet"><div class="loading" id="loading">Loading sheet…</div></div></div><div class="statusbar"><span id="currentTitle">01 - Cover Sheet</span><span>Drag to pan · Ctrl + wheel to zoom · Double-click to fit</span></div></section>
</main></div>
<script>
const sheets=[
{n:'01',t:'Cover Sheet',f:'01-cover-sheet.webp'},{n:'02',t:'Existing Conditions and Removals Plan',f:'02-existing-conditions-and-removals-plan.webp'},{n:'03',t:'Site Plan',f:'03-site-plan.webp'},{n:'04',t:'Grading & Drainage Plan',f:'04-grading-and-drainage-plan.webp'},{n:'05',t:'Utility Plan',f:'05-utility-plan.webp'},{n:'06',t:'Signage & Landscaping Plan',f:'06-signage-and-landscaping-plan.webp'},{n:'07',t:'Lighting Plan',f:'07-lighting-plan.webp'},{n:'08',t:'Soil Erosion & Sediment Control Plan',f:'08-soil-erosion-and-sediment-control-plan.webp'},{n:'09',t:'Soil Erosion & Sediment Control Notes',f:'09-soil-erosion-and-sediment-control-notes.webp'},{n:'10',t:'Construction Details-1',f:'10-construction-details-1.webp'},{n:'11',t:'Construction Details-2',f:'11-construction-details-2.webp'},{n:'S-1',t:'Tree Management Plan',f:'s-1-tree-management-plan.webp'},{n:'S-2',t:'Car Carrier Circulation Plan',f:'s-2-car-carrier-circulation-plan.webp'},{n:'S-3',t:'Fire Truck Circulation Plan',f:'s-3-fire-truck-circulation-plan.webp'}];
const $=id=>document.getElementById(id),wrap=$('canvasWrap'),stage=$('canvasStage'),img=$('planImage');
let page=Math.max(1,Math.min(14,Number(location.hash.match(/page=(\d+)/)?.[1]||1))),scale=1,rotation=0,naturalW=2400,naturalH=1600;const cache=new Map();
function src(i){return `sheets/${sheets[i-1].f}`}
function renderList(){const q=$('sheetSearch').value.trim().toLowerCase();$('sheetList').innerHTML='';sheets.forEach((s,i)=>{const label=`${s.n} - ${s.t}`;if(q&&!label.toLowerCase().includes(q))return;const b=document.createElement('button');b.className='sheet'+(page===i+1?' active':'');b.innerHTML=`<span class="num">${s.n}</span><span class="sheet-name">${s.t}</span><span class="ready-dot ${cache.has(i+1)?'loaded':''}"></span>`;b.onclick=()=>go(i+1);$('sheetList').appendChild(b)})}
function updateStage(){const rotated=rotation%180!==0;const w=(rotated?naturalH:naturalW)*scale,h=(rotated?naturalW:naturalH)*scale;stage.style.width=w+'px';stage.style.height=h+'px';img.style.width=naturalW+'px';img.style.height=naturalH+'px';img.style.transform=`rotate(${rotation}deg) scale(${scale})`;if(rotation===90)img.style.translate=`${naturalH*scale}px 0`;else if(rotation===180)img.style.translate=`${naturalW*scale}px ${naturalH*scale}px`;else if(rotation===270)img.style.translate=`0 ${naturalW*scale}px`;else img.style.translate='0 0';$('zoomLabel').textContent=Math.round(scale*100)+'%'}
async function showPage(p){page=Math.max(1,Math.min(14,p));$('loading').style.display='flex';$('pageInput').value=page;const s=sheets[page-1];$('currentTitle').textContent=`${s.n} - ${s.t}`;history.replaceState(null,'',`#page=${page}`);renderList();let loaded=cache.get(page);if(!loaded){loaded=new Image();loaded.decoding='async';loaded.src=src(page);cache.set(page,loaded);await loaded.decode().catch(()=>new Promise((res,rej)=>{loaded.onload=res;loaded.onerror=rej}))}naturalW=loaded.naturalWidth||2400;naturalH=loaded.naturalHeight||1600;img.src=loaded.src;updateStage();$('loading').style.display='none';renderList();preloadPriority(page)}
function go(p){showPage(Number(p)||1);$('sidebar').classList.remove('open')}
function fit(mode='page'){const rotated=rotation%180!==0,bw=rotated?naturalH:naturalW,bh=rotated?naturalW:naturalH,pad=56;const aw=Math.max(200,wrap.clientWidth-pad),ah=Math.max(200,wrap.clientHeight-pad);scale=mode==='width'?aw/bw:Math.min(aw/bw,ah/bh);scale=Math.max(.1,Math.min(scale,4));updateStage();wrap.scrollTo({left:0,top:0})}
let preloadStarted=false;function preloadPriority(center){if(preloadStarted)return;preloadStarted=true;const order=[center,center+1,center-1,...sheets.map((_,i)=>i+1)].filter((v,i,a)=>v>=1&&v<=14&&a.indexOf(v)===i);let loaded=cache.size;const next=()=>{const p=order.shift();if(!p){$('preloadStatus').textContent='100% set · all 14 sheets ready';return}if(cache.has(p)){loaded=cache.size;$('preloadStatus').textContent=`100% set · ${loaded}/14 sheets ready`;renderList();setTimeout(next,0);return}const im=new Image();im.decoding='async';im.src=src(p);cache.set(p,im);const done=()=>{loaded=cache.size;$('preloadStatus').textContent=`100% set · ${loaded}/14 sheets ready`;renderList();setTimeout(next,0)};im.onload=done;im.onerror=done};next()}
$('prevBtn').onclick=()=>go(page-1);$('nextBtn').onclick=()=>go(page+1);$('pageInput').onchange=e=>go(e.target.value);$('zoomIn').onclick=()=>{scale=Math.min(4,scale*1.2);updateStage()};$('zoomOut').onclick=()=>{scale=Math.max(.1,scale/1.2);updateStage()};$('fitWidth').onclick=()=>fit('width');$('fitPage').onclick=()=>fit('page');$('rotate').onclick=()=>{rotation=(rotation+90)%360;fit('page')};$('sheetSearch').oninput=renderList;$('fullscreen').onclick=()=>document.fullscreenElement?document.exitFullscreen():$('viewer').requestFullscreen();$('download').onclick=()=>{const a=document.createElement('a');a.href='edison-infiniti-100-percent.pdf';a.download='Edison Infiniti 100 Percent Plans.pdf';a.click()};$('menuBtn').onclick=()=>$('sidebar').classList.toggle('open');
wrap.addEventListener('wheel',e=>{if(!e.ctrlKey)return;e.preventDefault();const rect=wrap.getBoundingClientRect(),mx=e.clientX-rect.left+wrap.scrollLeft,my=e.clientY-rect.top+wrap.scrollTop,old=scale;scale=Math.max(.1,Math.min(4,scale*(e.deltaY<0?1.12:.89)));updateStage();wrap.scrollLeft=mx*(scale/old)-(e.clientX-rect.left);wrap.scrollTop=my*(scale/old)-(e.clientY-rect.top)},{passive:false});
let dragging=false,sx=0,sy=0,sl=0,st=0;wrap.addEventListener('mousedown',e=>{if(e.button!==0)return;dragging=true;wrap.classList.add('is-dragging');sx=e.clientX;sy=e.clientY;sl=wrap.scrollLeft;st=wrap.scrollTop;e.preventDefault()});window.addEventListener('mousemove',e=>{if(!dragging)return;wrap.scrollLeft=sl-(e.clientX-sx);wrap.scrollTop=st-(e.clientY-sy)});window.addEventListener('mouseup',()=>{dragging=false;wrap.classList.remove('is-dragging')});wrap.addEventListener('dblclick',()=>fit('page'));document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='PageUp')go(page-1);if(e.key==='ArrowRight'||e.key==='PageDown')go(page+1);if(e.key==='Home')go(1);if(e.key==='End')go(14)});window.addEventListener('resize',()=>{clearTimeout(window._r);window._r=setTimeout(()=>fit('page'),180)});
renderList();showPage(page).then(()=>fit('page'));if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body></html>
