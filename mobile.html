<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes,viewport-fit=cover">
<meta name="theme-color" content="#0b1220">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Edison Infiniti Mobile Plans</title>
<style>
:root{--top:50px;--bottom:56px;--bar:rgba(11,18,32,.97);--line:rgba(255,255,255,.15);--accent:#2563eb}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#202733;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}button,input{font:inherit}.app{position:fixed;inset:0;width:100%;height:100vh;height:100dvh;overflow:hidden;background:#202733}.top,.bottom{position:absolute;left:0;right:0;z-index:20;display:flex;align-items:center;background:var(--bar);color:#fff;border-color:var(--line);padding-left:max(7px,env(safe-area-inset-left));padding-right:max(7px,env(safe-area-inset-right));-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}.top{top:0;height:calc(var(--top) + env(safe-area-inset-top));padding-top:env(safe-area-inset-top);border-bottom:1px solid var(--line)}.bottom{bottom:0;height:calc(var(--bottom) + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);justify-content:center;gap:7px;border-top:1px solid var(--line)}.icon,.pill{height:38px;border:1px solid var(--line);border-radius:9px;background:rgba(255,255,255,.07);color:#fff;display:inline-flex;align-items:center;justify-content:center}.icon{width:40px;font-size:19px}.pill{padding:0 11px;font-size:12px;font-weight:750;white-space:nowrap}.icon:disabled{opacity:.35}.title{min-width:0;flex:1;padding:0 8px}.title strong{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:13px}.title span{display:block;margin-top:2px;font-size:10px;color:#bbc5d7}.viewer{position:absolute;left:0;right:0;top:calc(var(--top) + env(safe-area-inset-top));bottom:calc(var(--bottom) + env(safe-area-inset-bottom));overflow:auto;overscroll-behavior:contain;background:#252d3a;touch-action:pan-x pan-y;cursor:grab}.viewer.dragging{cursor:grabbing}.stage{position:relative;margin:8px auto;background:#fff;box-shadow:0 12px 34px rgba(0,0,0,.38);overflow:hidden}.plan{position:absolute;left:0;top:0;display:block;max-width:none;transform-origin:0 0;-webkit-user-drag:none;user-select:none}.loader{position:absolute;inset:0;z-index:12;display:grid;place-items:center;background:#252d3a;color:#fff}.loaderBox{padding:16px 20px;border-radius:12px;background:rgba(11,18,32,.94);font-size:13px}.drawer{position:absolute;z-index:30;top:0;bottom:0;left:0;width:min(88vw,350px);display:grid;grid-template-rows:auto auto 1fr;background:#fff;color:#172033;transform:translateX(-104%);transition:transform .18s ease;box-shadow:14px 0 40px rgba(0,0,0,.4)}.drawer.open{transform:translateX(0)}.drawerHead{padding:calc(14px + env(safe-area-inset-top)) 14px 12px;background:#0b1220;color:#fff;font-weight:800}.search{padding:10px;border-bottom:1px solid #e1e6ee}.search input{width:100%;height:40px;padding:0 11px;border:1px solid #cfd7e3;border-radius:9px;font-size:14px}.list{overflow:auto;padding:7px}.sheet{width:100%;min-height:48px;margin-bottom:3px;padding:7px;border:0;border-radius:9px;background:#fff;color:#172033;display:grid;grid-template-columns:46px 1fr;gap:8px;align-items:center;text-align:left}.sheet.active{background:#eaf1ff;color:#1747a6}.num{height:34px;border-radius:7px;background:#eef2f7;display:grid;place-items:center;font-size:11px;font-weight:850}.sheet.active .num{background:#2563eb;color:#fff}.name{font-size:13px;font-weight:650;line-height:1.2}.shade{position:absolute;inset:0;z-index:25;display:none;background:rgba(0,0,0,.44)}.shade.open{display:block}.orientation{position:absolute;right:max(8px,env(safe-area-inset-right));bottom:calc(var(--bottom) + env(safe-area-inset-bottom) + 8px);z-index:35;display:none;width:172px;padding:6px;border-radius:11px;background:#fff;color:#172033;box-shadow:0 12px 36px rgba(0,0,0,.38)}.orientation.open{display:block}.orientation button{display:block;width:100%;padding:10px;border:0;border-radius:8px;background:#fff;color:#172033;text-align:left;font-size:13px}.orientation button.active{background:#eaf1ff;color:#1747a6;font-weight:750}.hiddenBars .top,.hiddenBars .bottom{display:none}.hiddenBars .viewer{top:0;bottom:0}
@media(orientation:landscape){:root{--top:43px;--bottom:49px}.top{padding-top:0;height:var(--top)}.top .title span{display:none}.bottom{height:calc(var(--bottom) + env(safe-area-inset-bottom))}.viewer{top:var(--top);bottom:calc(var(--bottom) + env(safe-area-inset-bottom))}.icon{width:38px;height:34px}.pill{height:34px}.stage{margin:6px auto}}
</style>
</head>
<body>
<div id="app" class="app">
<header class="top"><button id="menu" class="icon" aria-label="Open sheet list">☰</button><div class="title"><strong id="title">01 - Cover Sheet</strong><span id="meta">Sheet 1 of 14 · Original orientation</span></div><button id="hide" class="icon" aria-label="Hide controls">⌄</button></header>
<div id="viewer" class="viewer"><div id="stage" class="stage"><img id="plan" class="plan" alt="Plan sheet" draggable="false"></div></div>
<div id="loader" class="loader"><div id="loaderText" class="loaderBox">Loading plan sheet…</div></div>
<footer class="bottom"><button id="prev" class="icon" aria-label="Previous sheet">‹</button><button id="pageBtn" class="pill">1 / 14</button><button id="next" class="icon" aria-label="Next sheet">›</button><button id="minus" class="icon" aria-label="Zoom out">−</button><button id="fit" class="pill">Fit</button><button id="plus" class="icon" aria-label="Zoom in">＋</button><button id="rotate" class="icon" aria-label="Change orientation">↻</button></footer>
<aside id="drawer" class="drawer"><div class="drawerHead">Edison Infiniti — 100% Set</div><div class="search"><input id="search" placeholder="Search sheets"></div><div id="list" class="list"></div></aside>
<div id="shade" class="shade"></div><div id="orientation" class="orientation"></div>
</div>
<script>
'use strict';
if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister())).catch(()=>{});}if('caches' in window){caches.keys().then(keys=>Promise.all(keys.map(k=>caches.delete(k)))).catch(()=>{});}
const sheets=[['01','Cover Sheet','01-cover-sheet.webp'],['02','Existing Conditions and Removals Plan','02-existing-conditions-and-removals-plan.webp'],['03','Site Plan','03-site-plan.webp'],['04','Grading & Drainage Plan','04-grading-and-drainage-plan.webp'],['05','Utility Plan','05-utility-plan.webp'],['06','Signage & Landscaping Plan','06-signage-and-landscaping-plan.webp'],['07','Lighting Plan','07-lighting-plan.webp'],['08','Soil Erosion & Sediment Control Plan','08-soil-erosion-and-sediment-control-plan.webp'],['09','Soil Erosion & Sediment Control Notes','09-soil-erosion-and-sediment-control-notes.webp'],['10','Construction Details-1','10-construction-details-1.webp'],['11','Construction Details-2','11-construction-details-2.webp'],['S-1','Tree Management Plan','s-1-tree-management-plan.webp'],['S-2','Car Carrier Circulation Plan','s-2-car-carrier-circulation-plan.webp'],['S-3','Fire Truck Circulation Plan','s-3-fire-truck-circulation-plan.webp']];
const $=id=>document.getElementById(id),viewer=$('viewer'),stage=$('stage'),plan=$('plan');let page=Math.max(1,Math.min(14,Number(new URLSearchParams(location.hash.slice(1)).get('page'))||1)),rotation=0,scale=1,nw=2400,nh=1600,mode='fit',loadId=0,drag=false,sx=0,sy=0,sl=0,st=0;const cache=new Map();
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function label(){return rotation===0?'Original orientation':rotation===90?'90° right':rotation===180?'Upside down':'90° left';}
function renderList(){const q=$('search').value.trim().toLowerCase();$('list').innerHTML='';sheets.forEach((s,i)=>{if(q&&!`${s[0]} ${s[1]}`.toLowerCase().includes(q))return;const b=document.createElement('button');b.className='sheet'+(i+1===page?' active':'');b.innerHTML=`<span class="num">${esc(s[0])}</span><span class="name">${esc(s[0])} - ${esc(s[1])}</span>`;b.onclick=()=>go(i+1);$('list').appendChild(b);});}
function updateText(){const s=sheets[page-1];$('title').textContent=`${s[0]} - ${s[1]}`;$('meta').textContent=`Sheet ${page} of 14 · ${label()}`;$('pageBtn').textContent=`${page} / 14`;$('prev').disabled=page===1;$('next').disabled=page===14;history.replaceState(null,'',`#page=${page}`);renderList();}
function rotatedSize(){return rotation%180?{w:nh,h:nw}:{w:nw,h:nh};}
function apply(){const W=nw*scale,H=nh*scale;stage.style.width=(rotation%180?H:W)+'px';stage.style.height=(rotation%180?W:H)+'px';plan.style.width=W+'px';plan.style.height=H+'px';if(rotation===90)plan.style.transform=`translate(${H}px,0) rotate(90deg)`;else if(rotation===180)plan.style.transform=`translate(${W}px,${H}px) rotate(180deg)`;else if(rotation===270)plan.style.transform=`translate(0,${W}px) rotate(270deg)`;else plan.style.transform='translate(0,0) rotate(0deg)';$('fit').textContent=mode==='fit'?'Fit':Math.round(scale*100)+'%';}
function fit(){mode='fit';const r=rotatedSize(),pad=12,aw=Math.max(220,viewer.clientWidth-pad),ah=Math.max(220,viewer.clientHeight-pad);scale=Math.max(.06,Math.min(5,Math.min(aw/r.w,ah/r.h)));apply();requestAnimationFrame(()=>{viewer.scrollLeft=Math.max(0,(stage.offsetWidth-viewer.clientWidth)/2);viewer.scrollTop=0;});}
function zoom(mult){mode='custom';const old=scale,cx=viewer.scrollLeft+viewer.clientWidth/2,cy=viewer.scrollTop+viewer.clientHeight/2;scale=Math.max(.06,Math.min(5,scale*mult));apply();viewer.scrollLeft=cx*(scale/old)-viewer.clientWidth/2;viewer.scrollTop=cy*(scale/old)-viewer.clientHeight/2;}
async function show(){const id=++loadId,s=sheets[page-1];$('loaderText').textContent=`Loading ${s[0]} - ${s[1]}…`;$('loader').style.display='grid';updateText();let im=cache.get(page);if(!im){im=new Image();im.decoding='async';im.src=s[2]+'?mobile=5';cache.set(page,im);}try{if(!(im.complete&&im.naturalWidth))await im.decode();if(id!==loadId)return;nw=im.naturalWidth;nh=im.naturalHeight;plan.src=im.src;plan.alt=`${s[0]} - ${s[1]}`;fit();$('loader').style.display='none';[page-1,page+1].filter(p=>p>=1&&p<=14).forEach(p=>{if(cache.has(p))return;const x=new Image();x.decoding='async';x.src=sheets[p-1][2]+'?mobile=5';cache.set(p,x);});}catch(e){cache.delete(page);$('loaderText').textContent='Unable to load this sheet. Tap Fit to retry.';}}
function closePanels(){$('drawer').classList.remove('open');$('shade').classList.remove('open');$('orientation').classList.remove('open');}
function go(p){page=Math.max(1,Math.min(14,Number(p)||1));closePanels();show();}
function setRotation(r){rotation=((Number(r)%360)+360)%360;renderOrientation();updateText();fit();closePanels();}
function renderOrientation(){const options=[[0,'Original orientation'],[90,'Rotate 90° right'],[180,'Rotate 180°'],[270,'Rotate 90° left']];$('orientation').innerHTML='';options.forEach(([v,l])=>{const b=document.createElement('button');b.textContent=l;b.className=v===rotation?'active':'';b.onclick=()=>setRotation(v);$('orientation').appendChild(b);});}
$('menu').onclick=()=>{$('drawer').classList.add('open');$('shade').classList.add('open');};$('shade').onclick=closePanels;$('search').oninput=renderList;$('prev').onclick=()=>go(page-1);$('next').onclick=()=>go(page+1);$('minus').onclick=()=>zoom(1/1.22);$('plus').onclick=()=>zoom(1.22);$('fit').onclick=()=>$('loader').style.display==='grid'?show():fit();$('rotate').onclick=()=>{renderOrientation();$('orientation').classList.toggle('open');};$('pageBtn').onclick=()=>{$('drawer').classList.add('open');$('shade').classList.add('open');};$('hide').onclick=()=>$('app').classList.add('hiddenBars');
let lastTap=0;viewer.addEventListener('touchend',e=>{const now=Date.now();if(now-lastTap<280){e.preventDefault();mode==='fit'?zoom(1.8):fit();}lastTap=now;},{passive:false});viewer.addEventListener('mousedown',e=>{if(e.button!==0)return;drag=true;sx=e.clientX;sy=e.clientY;sl=viewer.scrollLeft;st=viewer.scrollTop;viewer.classList.add('dragging');e.preventDefault();});window.addEventListener('mousemove',e=>{if(!drag)return;viewer.scrollLeft=sl-(e.clientX-sx);viewer.scrollTop=st-(e.clientY-sy);});window.addEventListener('mouseup',()=>{drag=false;viewer.classList.remove('dragging');});$('app').addEventListener('click',e=>{if($('app').classList.contains('hiddenBars')&&e.target.closest('.viewer'))$('app').classList.remove('hiddenBars');});let rt;window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(()=>{if(mode==='fit')fit();},160);});window.addEventListener('orientationchange',()=>setTimeout(fit,250));
renderOrientation();renderList();show();
</script>
</body>
</html>
