<style>

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#202733;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}button,input{font:inherit}.app{position:fixed;inset:0;width:100%;height:100vh;height:100dvh;overflow:hidden;background:#202733}.top,.bottom{position:absolute;left:0;right:0;z-index:20;display:flex;align-items:center;background:var(--bar);color:#fff;border-color:var(--line);padding-left:max(7px,env(safe-area-inset-left));padding-right:max(7px,env(safe-area-inset-right));-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}.top{top:0;height:calc(var(--top) + env(safe-area-inset-top));padding-top:env(safe-area-inset-top);border-bottom:1px solid var(--line)}.bottom{bottom:0;height:calc(var(--bottom) + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);justify-content:center;gap:7px;border-top:1px solid var(--line)}.icon,.pill{height:38px;border:1px solid var(--line);border-radius:9px;background:rgba(255,255,255,.07);color:#fff;display:inline-flex;align-items:center;justify-content:center}.icon{width:40px;font-size:19px}.pill{padding:0 11px;font-size:12px;font-weight:750;white-space:nowrap}.icon:disabled,.floatNav:disabled{opacity:.28}.title{min-width:0;flex:1;padding:0 8px}.title strong{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:13px}.title span{display:block;margin-top:2px;font-size:10px;color:#bbc5d7}.viewer{position:absolute;left:0;right:0;top:calc(var(--top) + env(safe-area-inset-top));bottom:calc(var(--bottom) + env(safe-area-inset-bottom));overflow:auto;overscroll-behavior:none;background:#252d3a;touch-action:none;cursor:grab;-webkit-overflow-scrolling:touch}.viewer.dragging{cursor:grabbing}.stage{position:relative;margin:8px auto;background:#fff;box-shadow:0 12px 34px rgba(0,0,0,.38);overflow:hidden}.plan{position:absolute;left:0;top:0;display:block;max-width:none;transform-origin:0 0;-webkit-user-drag:none;user-select:none}.loader{position:absolute;inset:0;z-index:12;display:grid;place-items:center;background:#252d3a;color:#fff}.loaderBox{padding:16px 20px;border-radius:12px;background:rgba(11,18,32,.94);font-size:13px}.drawer{position:absolute;z-index:30;top:0;bottom:0;left:0;width:min(90vw,370px);display:grid;grid-template-rows:auto auto 1fr;background:#fff;color:#172033;transform:translateX(-104%);transition:transform .18s ease;box-shadow:14px 0 40px rgba(0,0,0,.4)}.drawer.open{transform:translateX(0)}.drawerHead{padding:calc(14px + env(safe-area-inset-top)) 14px 12px;background:#0b1220;color:#fff;font-weight:800}.searchBox{padding:9px 10px 8px;border-bottom:1px solid #e1e6ee;background:#f8fafc}.searchBox input{width:100%;height:40px;padding:0 11px;border:1px solid #cfd7e3;border-radius:9px;font-size:14px;outline:none}.searchBox input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.12)}.searchStatus{height:18px;padding:4px 2px 0;color:#667085;font-size:10.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.list{overflow:auto;padding:7px}.sheet,.result{width:100%;margin-bottom:3px;padding:7px;border:0;border-radius:9px;background:#fff;color:#172033;display:grid;grid-template-columns:46px 1fr;gap:8px;align-items:center;text-align:left}.sheet{min-height:48px}.sheet.active,.result.active{background:#eaf1ff;color:#1747a6}.num{height:34px;border-radius:7px;background:#eef2f7;display:grid;place-items:center;font-size:11px;font-weight:850}.sheet.active .num,.result.active .num{background:#2563eb;color:#fff}.name{min-width:0;font-size:13px;font-weight:650;line-height:1.2}.resultText{min-width:0}.resultTitle{font-size:12.5px;font-weight:750;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.resultMeta{margin-top:3px;color:#667085;font-size:10.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.resultSnippet{margin-top:4px;color:#475467;font-size:11px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.empty{padding:18px 12px;color:#667085;font-size:12px;line-height:1.45;text-align:center}.shade{position:absolute;inset:0;z-index:25;display:none;background:rgba(0,0,0,.44)}.shade.open{display:block}.orientation{position:absolute;right:max(8px,env(safe-area-inset-right));bottom:calc(var(--bottom) + env(safe-area-inset-bottom) + 8px);z-index:35;display:none;width:172px;padding:6px;border-radius:11px;background:#fff;color:#172033;box-shadow:0 12px 36px rgba(0,0,0,.38)}.orientation.open{display:block}.orientation button{display:block;width:100%;padding:10px;border:0;border-radius:8px;background:#fff;color:#172033;text-align:left;font-size:13px}.orientation button.active{background:#eaf1ff;color:#1747a6;font-weight:750}.floatNav{position:absolute;top:50%;z-index:18;width:48px;height:64px;border:1px solid rgba(255,255,255,.28);border-radius:14px;background:rgba(11,18,32,.78);color:#fff;font-size:34px;line-height:1;display:none;align-items:center;justify-content:center;transform:translateY(-50%);box-shadow:0 8px 24px rgba(0,0,0,.32);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}.floatPrev{left:max(8px,env(safe-area-inset-left))}.floatNext{right:max(8px,env(safe-area-inset-right))}.hiddenBars .top,.hiddenBars .bottom{display:none}.hiddenBars .viewer{top:0;bottom:0}
@media(orientation:landscape){:root{--top:43px}.top{padding-top:0;height:var(--top)}.top .title span{display:none}.bottom{display:none}.viewer{top:var(--top);bottom:0}.icon{width:38px;height:34px}.pill{height:34px}.stage{margin:6px auto}.floatNav{display:flex}.orientation{bottom:12px}}

<body>
<div id="app" class="app">
<header class="top"><button id="menu" class="icon" aria-label="Open sheet list">☰</button><div class="title"><strong id="title">01 - Cover Sheet</strong><span id="meta">Sheet 1 of 14 · Original orientation</span></div><button id="hide" class="icon" aria-label="Hide controls">⌄</button></header>
<div id="viewer" class="viewer"><div id="stage" class="stage"><img id="plan" class="plan" alt="Plan sheet" draggable="false"></div></div>
<div id="loader" class="loader"><div id="loaderText" class="loaderBox">Loading plan sheet…</div></div>
<button id="floatPrev" class="floatNav floatPrev" aria-label="Previous sheet">‹</button><button id="floatNext" class="floatNav floatNext" aria-label="Next sheet">›</button>
<footer class="bottom"><button id="prev" class="icon" aria-label="Previous sheet">‹</button><button id="pageBtn" class="pill">1 / 14</button><button id="next" class="icon" aria-label="Next sheet">›</button><button id="minus" class="icon" aria-label="Zoom out">−</button><button id="fit" class="pill">Fit</button><button id="plus" class="icon" aria-label="Zoom in">＋</button><button id="rotate" class="icon" aria-label="Change orientation">↻</button></footer>
<aside id="drawer" class="drawer"><div class="drawerHead">Edison Infiniti — 100% Set</div><div class="searchBox"><input id="search" type="search" placeholder="Search all plan text"><div id="searchStatus" class="searchStatus">Search sheet names or drawing text</div></div><div id="list" class="list"></div></aside>
<div id="shade" class="shade"></div><div id="orientation" class="orientation"></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
'use strict';

const sheets=[['01','Cover Sheet','01-cover-sheet.webp'],['02','Existing Conditions and Removals Plan','02-existing-conditions-and-removals-plan.webp'],['03','Site Plan','03-site-plan.webp'],['04','Grading & Drainage Plan','04-grading-and-drainage-plan.webp'],['05','Utility Plan','05-utility-plan.webp'],['06','Signage & Landscaping Plan','06-signage-and-landscaping-plan.webp'],['07','Lighting Plan','07-lighting-plan.webp'],['08','Soil Erosion & Sediment Control Plan','08-soil-erosion-and-sediment-control-plan.webp'],['09','Soil Erosion & Sediment Control Notes','09-soil-erosion-and-sediment-control-notes.webp'],['10','Construction Details-1','10-construction-details-1.webp'],['11','Construction Details-2','11-construction-details-2.webp'],['S-1','Tree Management Plan','s-1-tree-management-plan.webp'],['S-2','Car Carrier Circulation Plan','s-2-car-carrier-circulation-plan.webp'],['S-3','Fire Truck Circulation Plan','s-3-fire-truck-circulation-plan.webp']];
const OCR_SUPPLEMENT={1:'tax map zoning map vicinity map aerial imagery property owners within two hundred feet',6:'no substitutions to plant list unless authorized by design engineer evergreen trees top of bank all planting beds shall be mulched three inch minimum riparian mitigation area one hundred year floodplain NJDEP permit stream encroachment shrubs groundcover stabilized by seeding or planting unacceptable plant materials signage conformance directional signs attached signs wall mounted signs internally illuminated freestanding signs state open water line fence sign detail proposed mulch line',7:'MRM light fixture detail LW light fixture detail luminaire fixture photometric lighting pole mounting wattage catalog'};
const $=id=>document.getElementById(id),viewer=$('viewer'),stage=$('stage'),plan=$('plan');let page=Math.max(1,Math.min(14,Number(new URLSearchParams(location.hash.slice(1)).get('page'))||1)),rotation=0,scale=1,nw=2400,nh=1600,mode='fit',loadId=0,drag=false,sx=0,sy=0,sl=0,st=0;const cache=new Map();
let touchMode='',touchStartX=0,touchStartY=0,touchScrollLeft=0,touchScrollTop=0,pinchStartDistance=0,pinchStartScale=1,pinchContentX=0,pinchContentY=0,touchMoved=false,lastTap=0;
let searchTexts=new Array(14).fill(''),searchRaw=new Array(14).fill(''),searchReady=false,indexing=false,indexedPages=0;
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function norm(s){return String(s).toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();}
function label(){return rotation===0?'Original orientation':rotation===90?'90° right':rotation===180?'Upside down':'90° left';}
function setStatus(text){$('searchStatus').textContent=text;}
function renderSheets(){const list=$('list');list.innerHTML='';sheets.forEach((s,i)=>{const b=document.createElement('button');b.className='sheet'+(i+1===page?' active':'');b.innerHTML=`<span class="num">${esc(s[0])}</span><span class="name">${esc(s[0])} - ${esc(s[1])}</span>`;b.onclick=()=>go(i+1);list.appendChild(b);});}
function countHits(text,term){if(!term)return 0;let n=0,pos=0;while((pos=text.indexOf(term,pos))!==-1){n++;pos+=Math.max(1,term.length);}return n;}
function makeSnippet(raw,terms){const lower=raw.toLowerCase();let pos=-1,term='';for(const t of terms){const p=lower.indexOf(t);if(p!==-1&&(pos===-1||p<pos)){pos=p;term=t;}}if(pos<0)return 'Matching drawing text found on this sheet.';const start=Math.max(0,pos-70),end=Math.min(raw.length,pos+term.length+120);return (start?'…':'')+raw.slice(start,end).replace(/\s+/g,' ').trim()+(end<raw.length?'…':'');}
function renderSearch(){const q=$('search').value.trim();if(!q){setStatus(searchReady?'Searchable text ready — 14 sheets':'Search sheet names or drawing text');renderSheets();return;}startIndexing();const terms=norm(q).split(' ').filter(Boolean),phrase=norm(q),results=[];for(let i=0;i<14;i++){const titleNorm=norm(sheets[i][0]+' '+sheets[i][1]),text=searchTexts[i]||titleNorm;const matches=terms.every(t=>text.includes(t));if(matches){const hits=Math.max(1,countHits(text,phrase)||countHits(text,terms[0]));results.push({i,hits,snippet:makeSnippet(searchRaw[i]||sheets[i][1],terms)});}}const list=$('list');list.innerHTML='';if(!results.length){list.innerHTML=`<div class="empty">${searchReady?'No drawing text found.':'Indexing the plan set… Results will appear as sheets are processed.'}</div>`;}else results.forEach(r=>{const s=sheets[r.i],b=document.createElement('button');b.className='result'+(r.i+1===page?' active':'');b.innerHTML=`<span class="num">${esc(s[0])}</span><span class="resultText"><span class="resultTitle">${esc(s[0])} - ${esc(s[1])}</span><span class="resultMeta">${r.hits} text match${r.hits===1?'':'es'}</span><span class="resultSnippet">${esc(r.snippet)}</span></span>`;b.onclick=()=>go(r.i+1);list.appendChild(b);});setStatus(searchReady?`${results.length} matching sheet${results.length===1?'':'s'} — native text + OCR`:`Indexing searchable text… ${indexedPages}/14 sheets`);}
function loadCachedIndex(){try{const cached=JSON.parse(localStorage.getItem('ei-plan-search-v2')||'null');if(Array.isArray(cached)&&cached.length===14){searchRaw=cached;searchTexts=cached.map(norm);searchReady=true;indexedPages=14;setStatus('Searchable text ready — 14 sheets');return true;}}catch{}return false;}
async function startIndexing(){if(searchReady||indexing)return;if(loadCachedIndex()){renderSearch();return;}indexing=true;setStatus('Preparing searchable plan text…');try{if(!window.pdfjsLib)throw new Error('PDF search library unavailable');pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';const doc=await pdfjsLib.getDocument({url:'edison-infiniti-100-percent.pdf?search=2',disableAutoFetch:false}).promise;for(let i=1;i<=14;i++){const p=await doc.getPage(i),content=await p.getTextContent(),native=content.items.map(x=>x.str).join(' '),raw=`${sheets[i-1][0]} ${sheets[i-1][1]} ${native} ${OCR_SUPPLEMENT[i]||''}`.replace(/\s+/g,' ').trim();searchRaw[i-1]=raw;searchTexts[i-1]=norm(raw);indexedPages=i;setStatus(`Indexing searchable text… ${i}/14 sheets`);if($('search').value.trim())renderSearch();await new Promise(r=>setTimeout(r,0));}searchReady=true;indexing=false;try{localStorage.setItem('ei-plan-search-v2',JSON.stringify(searchRaw));}catch{}setStatus('Searchable text ready — native text + OCR');renderSearch();}catch(e){indexing=false;setStatus('Text search could not load. Sheet-name search is still available.');console.error(e);}}
function updateText(){const s=sheets[page-1];$('title').textContent=`${s[0]} - ${s[1]}`;$('meta').textContent=`Sheet ${page} of 14 · ${label()}`;$('pageBtn').textContent=`${page} / 14`;['prev','floatPrev'].forEach(id=>$(id).disabled=page===1);['next','floatNext'].forEach(id=>$(id).disabled=page===14);history.replaceState(null,'',`#page=${page}`);$('search').value.trim()?renderSearch():renderSheets();}
function rotatedSize(){return rotation%180?{w:nh,h:nw}:{w:nw,h:nh};}
function apply(){const W=nw*scale,H=nh*scale;stage.style.width=(rotation%180?H:W)+'px';stage.style.height=(rotation%180?W:H)+'px';plan.style.width=W+'px';plan.style.height=H+'px';if(rotation===90)plan.style.transform=`translate(${H}px,0) rotate(90deg)`;else if(rotation===180)plan.style.transform=`translate(${W}px,${H}px) rotate(180deg)`;else if(rotation===270)plan.style.transform=`translate(0,${W}px) rotate(270deg)`;else plan.style.transform='translate(0,0) rotate(0deg)';$('fit').textContent=mode==='fit'?'Fit':Math.round(scale*100)+'%';}
function fit(){mode='fit';const r=rotatedSize(),pad=12,aw=Math.max(220,viewer.clientWidth-pad),ah=Math.max(220,viewer.clientHeight-pad);scale=Math.max(.06,Math.min(5,Math.min(aw/r.w,ah/r.h)));apply();requestAnimationFrame(()=>{viewer.scrollLeft=Math.max(0,(stage.offsetWidth-viewer.clientWidth)/2);viewer.scrollTop=0;});}
function zoom(mult){mode='custom';const old=scale,cx=viewer.scrollLeft+viewer.clientWidth/2,cy=viewer.scrollTop+viewer.clientHeight/2;scale=Math.max(.06,Math.min(5,scale*mult));apply();viewer.scrollLeft=cx*(scale/old)-viewer.clientWidth/2;viewer.scrollTop=cy*(scale/old)-viewer.clientHeight/2;}
async function show(){const id=++loadId,s=sheets[page-1];$('loaderText').textContent=`Loading ${s[0]} - ${s[1]}…`;$('loader').style.display='grid';updateText();let im=cache.get(page);if(!im){im=new Image();im.decoding='async';im.src=s[2]+'?mobile=9';cache.set(page,im);}try{if(!(im.complete&&im.naturalWidth))await im.decode();if(id!==loadId)return;nw=im.naturalWidth;nh=im.naturalHeight;plan.src=im.src;plan.alt=`${s[0]} - ${s[1]}`;fit();$('loader').style.display='none';[page-1,page+1].filter(p=>p>=1&&p<=14).forEach(p=>{if(cache.has(p))return;const x=new Image();x.decoding='async';x.src=sheets[p-1][2]+'?mobile=9';cache.set(p,x);});}catch(e){cache.delete(page);$('loaderText').textContent='Unable to load this sheet. Tap Fit to retry.';}}
function closePanels(){$('drawer').classList.remove('open');$('shade').classList.remove('open');$('orientation').classList.remove('open');}
function go(p){page=Math.max(1,Math.min(14,Number(p)||1));closePanels();show();}
function setRotation(r){rotation=((Number(r)%360)+360)%360;renderOrientation();updateText();fit();closePanels();}
function renderOrientation(){const options=[[0,'Original orientation'],[90,'Rotate 90° right'],[180,'Rotate 180°'],[270,'Rotate 90° left']];$('orientation').innerHTML='';options.forEach(([v,l])=>{const b=document.createElement('button');b.textContent=l;b.className=v===rotation?'active':'';b.onclick=()=>setRotation(v);$('orientation').appendChild(b);});}
function distance(a,b){return Math.hypot(b.clientX-a.clientX,b.clientY-a.clientY);}function midpoint(a,b){const r=viewer.getBoundingClientRect();return{x:(a.clientX+b.clientX)/2-r.left,y:(a.clientY+b.clientY)/2-r.top};}
viewer.addEventListener('touchstart',e=>{if(e.touches.length===1){const t=e.touches[0];touchMode='pan';touchStartX=t.clientX;touchStartY=t.clientY;touchScrollLeft=viewer.scrollLeft;touchScrollTop=viewer.scrollTop;touchMoved=false;}else if(e.touches.length>=2){const a=e.touches[0],b=e.touches[1],m=midpoint(a,b);touchMode='pinch';pinchStartDistance=Math.max(1,distance(a,b));pinchStartScale=scale;pinchContentX=(viewer.scrollLeft+m.x)/scale;pinchContentY=(viewer.scrollTop+m.y)/scale;mode='custom';touchMoved=true;}e.preventDefault();},{passive:false});
viewer.addEventListener('touchmove',e=>{if(touchMode==='pan'&&e.touches.length===1){const t=e.touches[0],dx=t.clientX-touchStartX,dy=t.clientY-touchStartY;if(Math.abs(dx)>2||Math.abs(dy)>2)touchMoved=true;viewer.scrollLeft=touchScrollLeft-dx;viewer.scrollTop=touchScrollTop-dy;}else if(e.touches.length>=2){const a=e.touches[0],b=e.touches[1],m=midpoint(a,b);if(touchMode!=='pinch'){touchMode='pinch';pinchStartDistance=Math.max(1,distance(a,b));pinchStartScale=scale;pinchContentX=(viewer.scrollLeft+m.x)/scale;pinchContentY=(viewer.scrollTop+m.y)/scale;}scale=Math.max(.06,Math.min(5,pinchStartScale*(distance(a,b)/pinchStartDistance)));apply();viewer.scrollLeft=pinchContentX*scale-m.x;viewer.scrollTop=pinchContentY*scale-m.y;touchMoved=true;}e.preventDefault();},{passive:false});
viewer.addEventListener('touchend',e=>{if(e.touches.length===1){const t=e.touches[0];touchMode='pan';touchStartX=t.clientX;touchStartY=t.clientY;touchScrollLeft=viewer.scrollLeft;touchScrollTop=viewer.scrollTop;}else if(e.touches.length===0){const now=Date.now();if(!touchMoved&&now-lastTap<280){mode==='fit'?zoom(1.8):fit();lastTap=0;}else if(!touchMoved)lastTap=now;touchMode='';}e.preventDefault();},{passive:false});
$('menu').onclick=()=>{$('drawer').classList.add('open');$('shade').classList.add('open');setTimeout(()=>$('search').focus(),100);startIndexing();};$('shade').onclick=closePanels;$('search').onfocus=startIndexing;$('search').oninput=renderSearch;$('prev').onclick=$('floatPrev').onclick=()=>go(page-1);$('next').onclick=$('floatNext').onclick=()=>go(page+1);$('minus').onclick=()=>zoom(1/1.22);$('plus').onclick=()=>zoom(1.22);$('fit').onclick=()=>$('loader').style.display==='grid'?show():fit();$('rotate').onclick=()=>{renderOrientation();$('orientation').classList.toggle('open');};$('pageBtn').onclick=()=>{$('drawer').classList.add('open');$('shade').classList.add('open');startIndexing();};$('hide').onclick=()=>$('app').classList.add('hiddenBars');viewer.addEventListener('mousedown',e=>{if(e.button!==0)return;drag=true;sx=e.clientX;sy=e.clientY;sl=viewer.scrollLeft;st=viewer.scrollTop;viewer.classList.add('dragging');e.preventDefault();});window.addEventListener('mousemove',e=>{if(!drag)return;viewer.scrollLeft=sl-(e.clientX-sx);viewer.scrollTop=st-(e.clientY-sy);});window.addEventListener('mouseup',()=>{drag=false;viewer.classList.remove('dragging');});$('app').addEventListener('click',e=>{if($('app').classList.contains('hiddenBars')&&e.target.closest('.viewer'))$('app').classList.remove('hiddenBars');});let rt;window.addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(()=>{if(mode==='fit')fit();},160);});window.addEventListener('orientationchange',()=>setTimeout(fit,250));
renderOrientation();loadCachedIndex();renderSheets();show();setTimeout(()=>{if(!searchReady)startIndexing();},2500);
</script>
